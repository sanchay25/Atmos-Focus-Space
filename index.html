<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atmos // Focus Space</title>
    <meta
      name="description"
      content="A calm, premium focus space for deep work. Timer, tasks, ambient music."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwindcss.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Geist", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body
    class="bg-[#08080a] text-[#d0d6e0] font-sans antialiased overflow-hidden"
  >
    <div class="noise-overlay"></div>

    <div
      id="bg-layer"
      class="fixed inset-0 z-0 transition-opacity duration-1000"
    >
      <div
        id="bg-image"
        class="absolute inset-0 bg-cover bg-center scale-105 transition-all duration-1000 ease-in-out opacity-0"
      ></div>
      <div
        class="absolute inset-0 bg-gradient-to-b from-[rgba(8,8,10,0.2)] via-transparent to-[rgba(8,8,10,0.7)]"
      ></div>
    </div>

    <div class="fixed top-6 left-6 z-50 flex items-center gap-2">
      <span class="text-sm font-bold tracking-[0.15em] uppercase text-white/80"
        >Atmos</span
      >
    </div>

    <nav
      class="fixed left-6 top-1/2 -translate-y-1/2 z-40 flex flex-col gap-1 p-2 glass-card rounded-2xl"
    >
      <button
        onclick="toggleWidget('timer')"
        id="btn-timer"
        class="sidebar-icon active"
        title="Timer"
      >
        <svg
          class="w-5 h-5 mx-auto"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        <span class="text-[9px] uppercase tracking-[0.15em] font-medium"
          >Timer</span
        >
      </button>
      <button
        onclick="toggleWidget('tasks')"
        id="btn-tasks"
        class="sidebar-icon active"
        title="Tasks"
      >
        <svg
          class="w-5 h-5 mx-auto"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <rect x="3" y="5" width="6" height="6" rx="1" />
          <path d="M3 17h6M13 6h8M13 12h8M13 18h8" />
        </svg>
        <span class="text-[9px] uppercase tracking-[0.15em] font-medium"
          >Tasks</span
        >
      </button>
      <button
        onclick="toggleWidget('music')"
        id="btn-music"
        class="sidebar-icon active"
        title="Music"
      >
        <svg
          class="w-5 h-5 mx-auto"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <circle cx="8" cy="18" r="4" />
          <path d="M12 18V2l7 4" />
        </svg>
        <span class="text-[9px] uppercase tracking-[0.15em] font-medium"
          >Music</span
        >
      </button>
      <button
        onclick="toggleWidget('calendar')"
        id="btn-calendar"
        class="sidebar-icon active"
        title="Calendar"
      >
        <svg
          class="w-5 h-5 mx-auto"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span class="text-[9px] uppercase tracking-[0.15em] font-medium"
          >Calendar</span
        >
      </button>
      <div class="h-px bg-white/10 mx-2 my-1"></div>
      <button
        onclick="nextBackground()"
        class="sidebar-icon"
        title="Change Background"
      >
        <svg
          class="w-5 h-5 mx-auto"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
        <span class="text-[9px] uppercase tracking-[0.15em] font-medium"
          >Scene</span
        >
      </button>
      <button
        onclick="toggleWallpaperPanel()"
        id="btn-wallpaper"
        class="sidebar-icon"
        title="Custom Wallpaper"
      >
        <svg
          class="w-5 h-5 mx-auto"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h7" />
          <path d="M16 5V1m0 0h4m-4 0l5 5" />
        </svg>
        <span class="text-[9px] uppercase tracking-[0.15em] font-medium"
          >Custom</span
        >
      </button>
      <button
        onclick="toggleFullscreen()"
        id="btn-fullscreen"
        class="sidebar-icon"
        title="Fullscreen"
      >
        <svg
          id="fs-icon"
          class="w-5 h-5 mx-auto"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <polyline points="15 3 21 3 21 9" />
          <polyline points="9 21 3 21 3 15" />
          <line x1="21" y1="3" x2="14" y2="10" />
          <line x1="3" y1="21" x2="10" y2="14" />
        </svg>
        <span class="text-[9px] uppercase tracking-[0.15em] font-medium"
          >Full</span
        >
      </button>
    </nav>

    <div
      id="wallpaper-panel"
      class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 glass-card rounded-2xl p-4 w-96 hidden"
    >
      <div class="flex justify-between items-center mb-3">
        <span
          class="text-[10px] uppercase tracking-[0.2em] font-bold text-[#7a839b]"
          >Custom Wallpaper</span
        >
        <button
          onclick="toggleWallpaperPanel()"
          class="text-[#7a839b] hover:text-[#d0d6e0] transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="flex gap-2 mb-3">
        <input
          id="wallpaper-url"
          placeholder="Paste image URL..."
          class="flex-1 bg-white/[0.03] border border-white/[0.08] rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#6c7bf7]/50 transition-colors placeholder:text-[#7a839b]/50 text-[#d0d6e0]"
        />
        <button
          onclick="applyWallpaperUrl()"
          class="widget-btn px-3"
          title="Apply"
        >
          <svg
            class="w-4 h-4 mx-auto"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </button>
      </div>
      <label
        class="widget-btn w-full flex items-center justify-center gap-2 cursor-pointer"
      >
        <svg
          class="w-4 h-4"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        <span>Upload Image</span>
        <input
          type="file"
          id="wallpaper-file"
          accept="image/*"
          class="hidden"
          onchange="applyWallpaperFile(event)"
        />
      </label>
      <button
        onclick="resetWallpaper()"
        class="text-[10px] text-[#7a839b] hover:text-[#d0d6e0] transition-colors mt-2 w-full text-center"
      >
        Reset to default
      </button>
    </div>

    <main class="relative w-full h-screen z-10">
      <div
        id="widget-timer"
        class="absolute glass-card w-80 p-6 rounded-3xl z-20 select-none"
        style="right: 40px; top: 80px"
      >
        <div
          class="drag-handle flex justify-between items-center mb-4 opacity-40 hover:opacity-100 transition-opacity"
          data-drag="timer"
        >
          <span
            class="text-[10px] uppercase tracking-[0.2em] font-bold text-[#7a839b]"
            >Focus Timer</span
          >
          <div class="w-2 h-2 rounded-full bg-[#6c7bf7] animate-pulse"></div>
        </div>
        <div class="text-center">
          <div
            id="timer-display"
            class="text-7xl font-extralight tracking-tighter mb-4 tabular-nums"
          >
            25:00
          </div>
          <div class="flex gap-2 mb-4">
            <button
              onclick="timerToggle()"
              id="timer-toggle-btn"
              class="widget-btn flex-1"
            >
              Start
            </button>
            <button onclick="timerReset()" class="widget-btn px-4">
              <svg
                class="w-4 h-4 mx-auto"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path d="M1 4v6h6" />
                <path d="M3.51 15a9 9 0 105.64-11.36L3 10" />
              </svg>
            </button>
          </div>
          <div class="flex gap-3 justify-center" id="timer-modes">
            <button
              onclick="timerSwitchMode(0)"
              class="text-xs font-semibold text-[#d0d6e0]"
            >
              Pomodoro
            </button>
            <button
              onclick="timerSwitchMode(1)"
              class="text-xs text-[#7a839b] hover:text-[#d0d6e0] transition-colors"
            >
              Short Break
            </button>
            <button
              onclick="timerSwitchMode(2)"
              class="text-xs text-[#7a839b] hover:text-[#d0d6e0] transition-colors"
            >
              Long Break
            </button>
          </div>
        </div>
      </div>

      <div
        id="widget-tasks"
        class="absolute glass-card w-80 p-6 rounded-3xl z-20 select-none"
        style="right: 40px; top: 380px"
      >
        <div
          class="drag-handle flex justify-between items-center mb-4 opacity-40 hover:opacity-100 transition-opacity"
          data-drag="tasks"
        >
          <span
            class="text-[10px] uppercase tracking-[0.2em] font-bold text-[#7a839b]"
            >Intentions</span
          >
          <span id="tasks-count" class="text-[10px] text-[#7a839b]">0</span>
        </div>
        <div class="flex gap-2 mb-4">
          <input
            id="task-input"
            placeholder="What's next?"
            class="flex-1 bg-white/[0.03] border border-white/[0.08] rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-[#6c7bf7]/50 transition-colors placeholder:text-[#7a839b]/50 text-[#d0d6e0]"
          />
          <button onclick="addTask()" class="widget-btn px-3">
            <svg
              class="w-4 h-4 mx-auto"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </div>
        <ul id="task-list" class="space-y-2 max-h-60 overflow-y-auto pr-1"></ul>
      </div>

      <div
        id="widget-calendar"
        class="absolute glass-card w-72 p-6 rounded-3xl z-20 select-none"
        style="left: 120px; top: 80px"
      >
        <div
          class="drag-handle flex justify-between items-center mb-4 opacity-40 hover:opacity-100 transition-opacity"
          data-drag="calendar"
        >
          <span
            class="text-[10px] uppercase tracking-[0.2em] font-bold text-[#7a839b]"
            >Calendar</span
          >
          <div class="flex gap-1">
            <button
              onclick="calPrev()"
              class="text-[#7a839b] hover:text-[#d0d6e0] transition-colors p-1"
            >
              <svg
                class="w-3.5 h-3.5"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path d="M15 19l-7-7 7-7" />
              </svg>
            </button>
            <button
              onclick="calNext()"
              class="text-[#7a839b] hover:text-[#d0d6e0] transition-colors p-1"
            >
              <svg
                class="w-3.5 h-3.5"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path d="M9 5l7 7-7 7" />
              </svg>
            </button>
          </div>
        </div>
        <div
          id="cal-month-label"
          class="text-sm font-medium text-center mb-3"
        ></div>
        <div class="grid grid-cols-7 gap-0 text-center mb-1">
          <div class="text-[10px] text-[#7a839b] py-1">Su</div>
          <div class="text-[10px] text-[#7a839b] py-1">Mo</div>
          <div class="text-[10px] text-[#7a839b] py-1">Tu</div>
          <div class="text-[10px] text-[#7a839b] py-1">We</div>
          <div class="text-[10px] text-[#7a839b] py-1">Th</div>
          <div class="text-[10px] text-[#7a839b] py-1">Fr</div>
          <div class="text-[10px] text-[#7a839b] py-1">Sa</div>
        </div>
        <div id="cal-grid" class="grid grid-cols-7 gap-0 text-center"></div>
      </div>

      <div
        id="widget-music"
        class="absolute glass-card w-72 p-6 rounded-3xl z-20 select-none"
        style="right: 360px; top: 80px"
      >
        <div
          class="drag-handle flex justify-between items-center mb-4 opacity-40 hover:opacity-100 transition-opacity"
          data-drag="music"
        >
          <span
            class="text-[10px] uppercase tracking-[0.2em] font-bold text-[#7a839b]"
            >Atmosphere</span
          >
          <svg
            class="w-3 h-3 text-[#7a839b]"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            viewBox="0 0 24 24"
          >
            <circle cx="8" cy="18" r="4" />
            <path d="M12 18V2l7 4" />
          </svg>
        </div>
        <div class="relative mb-3">
          <input
            id="music-url-input"
            placeholder="Paste YouTube link or search..."
            class="w-full bg-white/[0.03] border border-white/[0.08] rounded-xl px-4 py-2.5 pr-10 text-sm focus:outline-none focus:border-[#6c7bf7]/50 transition-colors placeholder:text-[#7a839b]/50 text-[#d0d6e0]"
          />
          <button
            type="button"
            onclick="musicPlayUrl()"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-[#7a839b] hover:text-[#6c7bf7] transition-colors p-1"
            title="Play"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
          </button>
        </div>
        <div
          id="music-search-results"
          class="mb-3 hidden max-h-32 overflow-y-auto space-y-1"
        ></div>
        <button
          onclick="musicToggle()"
          id="music-toggle-btn"
          class="widget-btn-accent w-full"
        >
          Play Stream
        </button>
        <div id="music-player" class="mt-4 rounded-xl overflow-hidden hidden">
          <iframe
            id="music-iframe"
            width="100%"
            height="0"
            allow="autoplay; encrypted-media"
            class="border-0"
            title="Ambient music player"
          ></iframe>
        </div>
      </div>
    </main>

    <script src="js/calendar.js"></script>
    <script src="js/draggable.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/music.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
